#cicd任务名称
name: Deploy vitepress Blog

#仓库对应的推送分支 什么时候触发 push的时候 master分支的时候
on:
  push:
    branches: [master]

# 要干嘛 ---jobs
jobs:
  deploy:
  # 操作系统
    runs-on: ubuntu-latest
    steps:
      - name: CheckoutCode #拉取代码
        uses: actions/checkout@v6 # 使用别人封装好的action，插件

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # 可以换成 18 或 22，建议 LTS 版本

      - name: Install dependencies
        run: npm ci

      # 关键：构建 VitePress 站点，必须确保 package.json 中的 docs:build 命令指向 src 目录。打包
      - name: Build VitePress site
        run: npm run build

      # 将构建好的 docs 目录同步到你的服务器
      - name: Deploy to Server
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete
          path: docs/                 # 你的 outDir 是 docs，且位于根目录
          remote_path: "/home/usr/docs"
          remote_host: ${{ secrets.HOST }}
          remote_user: ${{ secrets.USER }}
          remote_key: ${{ secrets.BLOG }}
      
